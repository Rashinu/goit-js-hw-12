<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Search Gallery - HW 12</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <form class="search-form" id="search-form">
        <input
          type="text"
          name="query"
          autocomplete="off"
          placeholder="Search images..."
          id="search-input"
        />
        <button type="submit" id="search-button">Search</button>
      </form>

      <div class="loader-container" id="loader">
        <span class="loader"></span>
        <p class="loader-text">Loading images, please wait...</p>
      </div>

      <ul class="gallery"></ul>

      <button type="button" class="load-more-btn is-hidden" id="load-more">Load more</button>
      
      <div class="loader-container is-hidden" id="load-more-loader">
        <span class="loader"></span>
        <p class="loader-text">Loading more images...</p>
      </div>

      <p class="end-message is-hidden" id="end-message">We're sorry, but you've reached the end of search results.</p>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
